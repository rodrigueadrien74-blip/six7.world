<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compteur de clics</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #222;
    color: white;
    font-family: Arial, sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
}

#screen {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

h1 {
    font-size: 60px;
    margin: 0;
}

p {
    font-size: 28px;
    margin-top: 20px;
}
</style>
</head>
<body>

<div id="screen">
    <h1 id="count">0</h1>
    <p>Touche ou clique n'importe où</p>
</div>

<script>
let count = 0;
const counter = document.getElementById("count");

function addClick() {
    count++;
    counter.textContent = count;
}

// Clic souris
document.addEventListener("click", addClick);

// Toucher téléphone
document.addEventListener("touchstart", function(e) {
    e.preventDefault(); // évite le clic supplémentaire sur mobile
    addClick();
}, { passive: false });
</script>

</body>
</html>
