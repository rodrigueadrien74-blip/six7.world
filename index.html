<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<title>Clicker + Rebirth</title>
<link rel="icon" href="rainbow.ico" type="image/x-icon">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
    -webkit-user-select:none;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial;
    background:#222;
    color:white;
}

#game{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    cursor:pointer;
}

h1{
    font-size:70px;
}

h2{
    margin-top:10px;
}

button{
    margin-top:30px;
    font-size:28px;
    padding:15px 40px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#00bfff;
    color:white;
}

button:disabled{
    background:gray;
    cursor:not-allowed;
}

#bonus{
    margin-top:20px;
    font-size:24px;
}
</style>
</head>

<body>

<div id="game">

<h1 id="clicks">0</h1>

<h2>
Rebirths :
<span id="rebirths">0</span>
</h2>

<h2>
Coût :
<span id="cost">100</span>
</h2>

<div id="bonus">
+1 clic par touche
</div>

<button id="rebirthBtn" disabled>
Faire un Rebirth
</button>

</div>

<script>

const colors = [
    "#ff0000",
    "#ff8400",
    "#ffff00",
    "#00ff00",
    "#0000ff",
    "#ff00ff"
];

let index = 0;

const button = document.getElementById("rebirthBtn");

setInterval(() => {

    const color = colors[index];

    document.body.style.backgroundColor = color;

    button.style.backgroundColor = color;

    // Couleur du texte pour qu'il reste lisible
    button.style.color = "white";
    button.style.border = "3px solid white";

    index = (index + 1) % colors.length;

}, 1000);

// let index = 0;

// setInterval(() => {
//     document.body.style.background = colors[index];
//     index = (index + 1) % colors.length;
// }, 1000);

let clicks = 0;

let rebirths = 0;

let rebirthCost = 100;

const clicksText =
document.getElementById("clicks");

const rebirthText =
document.getElementById("rebirths");

const costText =
document.getElementById("cost");

const bonusText =
document.getElementById("bonus");

// const button =
// document.getElementById("rebirthBtn");

if("serviceWorker" in navigator) { 
    navigator.serviceWorker.register("sw.js"); 
}

function update(){

    clicksText.innerHTML =
    clicks;

    rebirthText.innerHTML =
    rebirths;

    costText.innerHTML =
    rebirthCost;

    bonusText.innerHTML =
    "+"+(rebirths+1)+" clic(s) par touche";

    button.disabled =
    clicks < rebirthCost;

}

function clickGame(){

    clicks += rebirths + 1;

    update();

}

function rebirth(){

    if(clicks < rebirthCost)
        return;

    clicks = 0;

    rebirths++;

    rebirthCost =
    Math.floor(rebirthCost*2);

    update();

}

document.addEventListener("click",function(e){

    if(e.target===button)
        return;

    clickGame();

});

document.addEventListener("touchstart",function(e){

    if(e.target===button)
        return;

    clickGame();

},{passive:true});

button.onclick=rebirth;

update();

</script>

</body>
</html>
